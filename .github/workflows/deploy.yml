name: Deploy

on:
  push:
    branches: ["main", "master"]

env:
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/hotwax-devops-pt2
  DEPLOY_DIR: /opt/demo-app
  COMPOSE_FILE: docker-compose.ec2.yml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-backend:latest
            ${{ env.IMAGE_BASE }}-backend:${{ github.run_number }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-frontend:latest
            ${{ env.IMAGE_BASE }}-frontend:${{ github.run_number }}

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p ${{ env.DEPLOY_DIR }}
            sudo chown -R ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} ${{ env.DEPLOY_DIR }}

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ${{ env.COMPOSE_FILE }}
          target: ${{ env.DEPLOY_DIR }}

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_BASE,DEPLOY_DIR,COMPOSE_FILE,GHCR_USER,GHCR_PAT
          script: |
            echo "IMAGE_BASE=${{ env.IMAGE_BASE }}" > ${{ env.DEPLOY_DIR }}/.env
            docker login ghcr.io -u "$GHCR_USER" -p "$GHCR_PAT"
            docker compose -f ${{ env.DEPLOY_DIR }}/${{ env.COMPOSE_FILE }} pull
            docker compose -f ${{ env.DEPLOY_DIR }}/${{ env.COMPOSE_FILE }} up -d
            docker logout ghcr.io
