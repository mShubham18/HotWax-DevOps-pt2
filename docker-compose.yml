name: demo-app

services:
  db:
    image: postgres:15
    container_name: fastapi-react-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    image: ${IMAGE_BASE}-backend:latest
    container_name: fastapi-react-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/appdb
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    image: ${IMAGE_BASE}-frontend:latest
    container_name: fastapi-react-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "80:5173"

volumes:
  db_data:
